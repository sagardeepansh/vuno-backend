<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Chat</title><style>body{margin:0;font-family:Segoe UI,sans-serif}#chatToggle{position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;background:#111;color:#fff;border:0;cursor:pointer;font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,.2)}#chatContainer{position:fixed;bottom:20px;right:20px;width:320px;height:420px;background:#fff;border-radius:12px;box-shadow:0 10px 9px rgb(0 0 0 / 9%);display:none;flex-direction:column;overflow:hidden}#header{background:#111;color:#fff;padding:12px;display:flex;justify-content:space-between}#messages{flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}.msg{max-width:75%;padding:8px 12px;border-radius:12px;font-size:13px}.user{align-self:flex-end;background:#111;color:#fff}.bot{align-self:flex-start;background:#eee}#inputBox{display:flex;padding:8px;border-top:1px solid #eee}input{flex:1;padding:8px;border-radius:20px;border:1px solid #ccc;outline:none}.sendBtn{margin-left:6px;padding:8px 12px;border:0;background:#111;color:#fff;border-radius:20px;cursor:pointer}.minimized{height:50px!important}.minimized #messages,.minimized #inputBox{display:none} button{background: none;color: #fff;border: none;cursor: pointer;}</style></head><body><button id="chatToggle">💬</button><div id="chatContainer"><div id="header"><span>Chat</span><div><button id="minBtn">—</button><button id="closeBtn">✕</button></div></div><div id="messages"></div><div id="inputBox"><input id="input" placeholder="Type..."/><button class="sendBtn" id="sendBtn">Send</button></div></div><script>const API="https://vuno-backend.vercel.app/api/chat";let API_KEY=null,isLoading=false;const chat=document.getElementById("chatContainer"),input=document.getElementById("input"),sendBtn=document.getElementById("sendBtn"),messages=document.getElementById("messages");document.getElementById("chatToggle").onclick=()=>{chat.style.display=chat.style.display==="flex"?"none":"flex";chat.classList.remove("minimized")};document.getElementById("minBtn").onclick=()=>chat.classList.toggle("minimized");document.getElementById("closeBtn").onclick=()=>chat.style.display="none";function addMessage(t,e){const n=document.createElement("div");n.className="msg "+e,n.innerText=t,messages.appendChild(n),messages.scrollTop=messages.scrollHeight}function setLoading(t){isLoading=t,sendBtn.disabled=t,sendBtn.innerText=t?"...":"Send"}async function send(){const t=input.value.trim();if(!t||isLoading)return;if(!API_KEY)return addMessage("API key missing","bot");addMessage(t,"user"),input.value="",setLoading(!0);try{const e=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":API_KEY},body:JSON.stringify({query:t})}),n=await e.json();addMessage(e.ok?n.answer||"No response":n.message||"Failed","bot")}catch{addMessage("Server error","bot")}setLoading(!1)}sendBtn.onclick=send,input.addEventListener("keypress",t=>"Enter"===t.key&&send()),window.addEventListener("message",t=>{if("CHATBOT_CONFIG"===t.data?.type){API_KEY=t.data.payload?.apiKey,API_KEY||addMessage("Invalid API key","bot")}});</script></body></html>
