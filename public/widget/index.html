<!DOCTYPE html>
<html>

<head>
    <title>Floating Chat Widget</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
        }

        #chatToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #111;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        #chatContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 420px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 9px rgb(0 0 0 / 9%);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            background: #111;
            color: white;
            padding: 12px;
            display: flex;
            justify-content: space-between;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
        }

        .user {
            align-self: flex-end;
            background: #111;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #eee;
        }

        #inputBox {
            display: flex;
            padding: 8px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        button.sendBtn {
            margin-left: 6px;
            padding: 8px 12px;
            border: none;
            background: #111;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        .minimized {
            height: 50px !important;
        }

        .minimized #messages,
        .minimized #inputBox {
            display: none;
        }
    </style>
</head>

<body>

    <button id="chatToggle">💬</button>

    <div id="chatContainer">
        <div id="header">
            <span>Chat</span>
            <div>
                <button onclick="toggleMinimize()">—</button>
                <button onclick="toggleChat()">✕</button>
            </div>
        </div>

        <div id="messages"></div>

        <div id="inputBox">
            <input id="input" placeholder="Type..." />
            <button class="sendBtn" id="sendBtn" onclick="send()">Send</button>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000/api/chat";

        let API_KEY = null;
        let isLoading = false;

        const chat = document.getElementById("chatContainer");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");

        function toggleChat() {
            chat.style.display = chat.style.display === "flex" ? "none" : "flex";
            chat.classList.remove("minimized");
        }

        document.getElementById("chatToggle").onclick = toggleChat;

        function toggleMinimize() {
            chat.classList.toggle("minimized");
        }

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;

            const messages = document.getElementById("messages");
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function setLoading(state) {
            isLoading = state;
            sendBtn.disabled = state;
            sendBtn.innerText = state ? "..." : "Send";
        }

        async function send() {
            const message = input.value.trim();

            if (!message || isLoading) return;

            if (!API_KEY) {
                addMessage("API key missing", "bot");
                return;
            }

            addMessage(message, "user");
            input.value = "";

            setLoading(true);

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": API_KEY
                    },
                    body: JSON.stringify({
                        query: message,
                        variables: {}
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    addMessage(data?.message || "Request failed", "bot");
                } else {
                    addMessage(data?.answer || "No response", "bot");
                }

            } catch (err) {
                addMessage("Server error", "bot");
            }

            setLoading(false);
        }

        input.addEventListener("keypress", function (e) {
            if (e.key === "Enter") send();
        });

        window.addEventListener("message", (event) => {
            if (event.data?.type === "CHATBOT_CONFIG") {
                const config = event.data.payload;

                API_KEY = config?.apiKey;

                // console.log("Received API Key:", API_KEY);

                if (!API_KEY) {
                    addMessage("Invalid API key config", "bot");
                }
            }
        });
    </script>

</body>

</html>
